<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetWatch - All Alerts</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #e9ecef;
            --accent-color: #0f3460;
            --high-severity: #e94560;
            --med-severity: #f0a500;
            --low-severity: #00d1b2;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: var(--accent-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav h1 { margin: 0; font-size: 1.5rem; }
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; }
        nav a { color: white; text-decoration: none; font-weight: bold; }
        .container { padding: 2rem; max-width: 1200px; margin: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #2d3436; }
        th { background-color: #0f3460; }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-high { background-color: var(--high-severity); }
        .badge-medium { background-color: var(--med-severity); color: black; }
        .badge-low { background-color: var(--low-severity); color: black; }
    </style>
</head>
<body>
    <nav>
        <h1>NetWatch Security</h1>
        <ul>
            <li><a href="/">Overview</a></li>
            <li><a href="/alerts">Alerts</a></li>
            <li><a href="/report">Report</a></li>
        </ul>
    </nav>
    <div class="container">
        <h2>Full Alerts Log</h2>
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Source IP</th>
                    <th>Event Type</th>
                    <th>Severity</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody>
                {% for alert in alerts %}
                <tr>
                    <td>{{ alert.timestamp }}</td>
                    <td>{{ alert.source_ip }}</td>
                    <td>{{ alert.event_type }}</td>
                    <td><span class="badge badge-{{ alert.severity.lower() }}">{{ alert.severity }}</span></td>
                    <td>{{ alert.description }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
